<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#d97706" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="BookLens" />
    <meta name="description" content="AI-powered book summarizer — get chapter summaries and mind maps in seconds." />
    <meta name="mobile-web-app-capable" content="yes" />

    <title>BookLens — AI Book Summarizer</title>

    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/bookLens.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/bookLens.svg" />
    <link rel="stylesheet" href="/styles.css" />

    <!-- React 18 -->
    <script crossorigin src="/vendor/react.development.js"></script>
    <script crossorigin src="/vendor/react-dom.development.js"></script>

    <!-- Babel standalone (compiles JSX in the browser) -->
    <script src="/vendor/babel.min.js"></script>

    <!-- Tailwind CSS Play CDN -->
    <script src="/vendor/tailwind.cdn.js"></script>

    <!-- D3.js v7 -->
    <script src="/vendor/d3.v7.min.js"></script>

    <!-- jsPDF -->
    <script src="/vendor/jspdf.umd.min.js"></script>

    <!-- html2canvas -->
    <script src="/vendor/html2canvas.min.js"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              serif: ['"Playfair Display"', 'Georgia', 'serif'],
              sans: ['Inter', 'system-ui', 'sans-serif'],
            },
            colors: {
              amber: {
                50:  '#fffbeb',
                100: '#fef3c7',
                200: '#fde68a',
                300: '#fcd34d',
                400: '#fbbf24',
                500: '#f59e0b',
                600: '#d97706',
                700: '#b45309',
                800: '#92400e',
                900: '#78350f',
              },
            },
          },
        },
      };
    </script>
  </head>
  <body class="bg-amber-50 text-stone-800 font-sans min-h-screen">
    <div id="root"></div>

    <!-- Register service worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js').catch(console.warn);
        });
      }
    </script>

    <!-- Main React app (JSX compiled by Babel) -->
    <script type="text/babel" src="/app.js"></script>
  </body>
</html>
